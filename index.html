<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">

    <title>CV sample</title>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-photo">
                <div class="header-photo__fon"></div>
                <img src="./img/profile-photo.png" alt="" class="header-photo__item">
            </div>
            <div class="header-information">
                <h1 class="header-information__title">Kuanyshev Mirambek</h1>
                <span class="header-information__profession">Frontend Developer</span>
                <div class="header-information__description description">
                    <span class="description__title">Profile</span>
                    <p class="description__text">In this CV is my development experience. Things I achieve through projects and works.</p>
                </div>
            </div>
        </div>     
    </header>
    <main class="main">
        <div class="container">
            <div class="main-left">
                <div class="main-left__education education">

                </div>
                <div class="main-left__expertise"></div>
                <div class="main-left__contacts"></div>
            </div>
            <div class="main-right"></div>
        </div>
    </main>
    
</body>
</html>
